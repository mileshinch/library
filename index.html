<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="styles.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <button id="open-form-btn" onclick="">Add new book</button>
    <form id="myForm" hidden>
      <label for="title">Title:</label>
      <input type="text" name="title" placeholder="The Hobbit" required />
      <label for="author">Author:</label>
      <input type="text" name="author" placeholder="J.R.R. Tolkien" required />

      <fieldset>
        <legend>Have you read it?</legend>
        <label
          ><input type="radio" name="read" value="true" checked /> Yes</label
        >
        <label><input type="radio" name="read" value="false" /> No</label>
      </fieldset>
      <label for="review">Add a review:</label>
      <textarea
        name="review"
        placeholder="It was terrible because..."
        rows="3"
        required
      ></textarea>
      <button type="submit">Submit</button>
      <button type="button" id="cancelBtn">Cancel</button>
    </form>
    <div class="cards-container"></div>

    <div id="myModal" class="modal" style="display: none">
      <div class="modal-content">
        <span id="closeModalBtn" class="close">&times;</span>
        <div id="modalBody"></div>
      </div>
    </div>

    <script src="library.js"></script>
  </body>
</html>
